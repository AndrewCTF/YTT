name: "Publish"

on:
  push:
    tags:
      - v*

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install 3.12

      # --no-sources ensures the build matches what other tools produce.
      - name: Build
        run: uv build --no-sources

      # No credentials needed: PyPI Trusted Publisher uses the OIDC token granted
      # by `id-token: write` above. Configure the publisher on PyPI to match this
      # repo (AndrewCTF/YTT), workflow (publish.yml), and environment (pypi).
      - name: Publish
        run: uv publish --trusted-publishing always
